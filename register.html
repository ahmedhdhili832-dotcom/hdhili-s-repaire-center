<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Inscription</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="form-container">

<h1>Créer un Compte</h1>

<form
action="register.php"
method="POST">

<input
type="text"
name="fullname"
placeholder="Nom complet"
required>

<input
type="email"
name="email"
placeholder="Adresse Email"
required>

<input
type="text"
name="phone"
placeholder="Téléphone"
required>

<input
type="password"
name="password"
placeholder="Mot de passe"
required>

<button type="submit">
Créer le compte
</button>

</form>

<p>

Déjà inscrit ?

<a href="login.html">
Connexion
</a>

</p>

</div>

</body>

</html>
